name = "jode-codex"
main = "src/index.ts"
compatibility_date = "2026-05-31"
compatibility_flags = ["nodejs_compat"]
# Custom domain only: workers.dev + preview URLs are OFF so this agent is
# reachable solely via its jode.jacquesverre.com subdomain. One Cloudflare Access
# app over *.jode.jacquesverre.com gates all three agents with a single login.
workers_dev = false
preview_urls = false
routes = [
  { pattern = "codex.jode.jacquesverre.com", custom_domain = true },
]

# Cloudflare Access gate config (non-secret). The Worker verifies the Access JWT
# against these on every request — see @jode/auth + apps/codex/README.md.
# Set these to your team domain, the Access application's AUD tag, and the single
# allowed email. BRIDGE_KEY is NOT here — it's a secret: `wrangler secret put BRIDGE_KEY`.
[vars]
ACCESS_TEAM_DOMAIN = "https://lucky-truth-10f2.cloudflareaccess.com"
ACCESS_AUD = "2a4a41c1761999b8feb94c25da28f51ee10c73a17eb0b42d17cbc08c7bb05628"
ALLOWED_EMAIL = "jverre@gmail.com"

# The SHARED jode filesystem (non-secret): ONE R2 bucket FUSE-mounted at
# /workspace by every tool (claude-code, opencode, codex) — the user sees one
# "remote computer" with the same live files in every agent. The S3 creds the
# container mounts with are secrets: R2_ENDPOINT / R2_ACCESS_KEY_ID /
# R2_SECRET_ACCESS_KEY (wrangler secret put).
R2_BUCKET = "jode-workspace"

[observability]
enabled = true

  [observability.logs]
  enabled = true
  invocation_logs = true
  head_sampling_rate = 1

[assets]
# The rehosted Codex renderer (the `webview/` SPA in app.asar). Produced by
# `npm run build:payload` (regenerated from /Applications/Codex.app; gitignored).
# The Worker injects the bridge-client into index.html and intercepts SPA routes.
directory = "payload/linux-rehost/app/webview"
binding = "ASSETS"
not_found_handling = "none"
# Run the Worker BEFORE static-asset serving so it can inject the bridge-client
# into index.html and intercept SPA routes (otherwise CF serves the raw asset
# index.html and bypasses the Worker).
run_worker_first = true

# The persistent workspace bucket. Bound for Worker-side ops (listing/pruning
# snapshots); the in-container sync uses the S3 API with the R2_* secrets.
[[r2_buckets]]
binding = "WORKSPACE"
bucket_name = "jode-workspace"

[[containers]]
class_name = "CodexBridgeContainer"
image = "./Dockerfile"
# 1 instance: a single container serves ALL clients (WS + HTTP + diagnostics), so
# the browser, bridge, and /debug-rpc are guaranteed consistent. With 2, requests
# could land on different containers — making round-trip bugs appear/vanish per
# connection and RPCs invisible to /debug-rpc.
max_instances = 1

  [containers.instance_type]
  vcpu = 4
  memory_mib = 12_288
  disk_mb = 20_000

[[durable_objects.bindings]]
name = "CODEX_BRIDGE"
class_name = "CodexBridgeContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CodexBridgeContainer"]
