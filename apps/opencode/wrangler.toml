name = "jode-opencode"
main = "src/index.ts"
compatibility_date = "2026-05-31"
compatibility_flags = ["nodejs_compat"]
# Custom domain only: workers.dev + preview URLs are OFF so this agent is
# reachable solely via its jode.jacquesverre.com subdomain. One Cloudflare Access
# app over *.jode.jacquesverre.com gates all three agents with a single login.
workers_dev = false
preview_urls = false
routes = [
  { pattern = "opencode.jode.jacquesverre.com", custom_domain = true },
]

# Cloudflare Access gate config (non-secret). The Worker verifies the Access JWT
# against these on every request — including the WebSocket upgrade — via @jode/edge.
# Same single-email Zero Trust model as @jode/claude-code. Set these to your team
# domain, the Access application's AUD tag, and the single allowed email.
[vars]
ACCESS_TEAM_DOMAIN = "https://lucky-truth-10f2.cloudflareaccess.com"
ACCESS_AUD = "2a4a41c1761999b8feb94c25da28f51ee10c73a17eb0b42d17cbc08c7bb05628"
ALLOWED_EMAIL = "jverre@gmail.com"

# The SHARED jode filesystem (non-secret): ONE R2 bucket FUSE-mounted at
# /workspace by every tool (claude-code, opencode, codex) — the user sees one
# "remote computer" with the same live files in every agent. The S3 creds the
# container mounts with are secrets: R2_ENDPOINT / R2_ACCESS_KEY_ID /
# R2_SECRET_ACCESS_KEY (wrangler secret put).
R2_BUCKET = "jode-workspace"

[observability]
enabled = true

  [observability.logs]
  enabled = true
  invocation_logs = true
  head_sampling_rate = 1

# The shared persistent filesystem bucket (all jode tools). Bound for Worker-side
# ops (listing/pruning snapshots); the in-container sync uses the S3 API with the
# secrets above.
[[r2_buckets]]
binding = "WORKSPACE"
bucket_name = "jode-workspace"

[[containers]]
class_name = "OpencodeContainer"
image = "./Dockerfile"
# 1 instance: a single container serves ALL clients on one shared /workspace, so
# every connection sees the same files and session state. Multi-tenant (per-user
# container keyed off the Access email) is a later step — see README.
max_instances = 1

  [containers.instance_type]
  # The agent runs installs/builds/tests inside the container — give it real
  # resources. Cloudflare requires >=3 GiB per vCPU for the first 4 vCPUs, so 4
  # vCPU needs >=12 GiB (matches claude-code/codex).
  vcpu = 4
  memory_mib = 12_288
  disk_mb = 16_000

[[durable_objects.bindings]]
name = "OPENCODE"
class_name = "OpencodeContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OpencodeContainer"]
