name = "jode-web"
main = "src/worker.ts"
compatibility_date = "2026-05-31"
compatibility_flags = ["nodejs_compat"]
# Custom domain only, like the agent workers. Add app.jode.jacquesverre.com to
# the SAME Cloudflare Access app that gates the agents (same ACCESS_AUD) so one
# login covers the shell and every agent it frames.
workers_dev = false
preview_urls = false
routes = [
  { pattern = "app.jode.jacquesverre.com", custom_domain = true },
]

# Cloudflare Access gate (non-secret) — identical to the agent workers; the
# Worker verifies the Access JWT on every request (@jode/auth). Same AUD because
# app.jode.jacquesverre.com belongs to the same Access application.
[vars]
ACCESS_TEAM_DOMAIN = "https://lucky-truth-10f2.cloudflareaccess.com"
ACCESS_AUD = "2a4a41c1761999b8feb94c25da28f51ee10c73a17eb0b42d17cbc08c7bb05628"
ALLOWED_EMAIL = "jverre@gmail.com"

[observability]
enabled = true

[assets]
# The built shell SPA (vite → ./dist). SPA fallback so client routes resolve.
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Run the Worker first so Access is enforced before any asset is served.
run_worker_first = true
